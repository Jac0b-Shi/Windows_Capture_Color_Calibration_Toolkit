name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WgcColorCalibrator.sln --locked-mode -p:Platform=x64

      - name: Build
        run: dotnet build WgcColorCalibrator.sln --configuration Release --no-restore -p:Platform=x64

      - name: Test
        run: dotnet test WgcColorCalibrator.sln --configuration Release --no-build -p:Platform=x64 --verbosity normal

